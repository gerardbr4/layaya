<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layaya — Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #f2faf2;
      --green:    #77be79;
      --green-dk: #3d7a3f;
      --green-xdk:#1e4a20;
      --green-lt: #a8d5aa;
      --green-xlt:#d6edd7;
      --muted:    #5a8f5c;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 55%, rgba(119, 190, 121, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(61, 122, 63, 0.12) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      color: var(--green-xdk);
      overflow: hidden;
    }

    /* Decorative top/bottom borders */
    body::before,
    body::after {
      content: '';
      position: fixed;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--green-dk), var(--green), var(--green-lt), var(--green), var(--green-dk));
    }
    body::before { top: 0; }
    body::after  { bottom: 0; }

    .container {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 640px;
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      margin-bottom: 2.5rem;
    }

    .logo-wrap img {
      width: min(280px, 70vw);
      filter:
        drop-shadow(0 6px 20px rgba(61, 122, 63, 0.18))
        drop-shadow(0 2px 6px rgba(61, 122, 63, 0.10));
      transition: transform 0.4s ease;
    }

    .logo-wrap img:hover {
      transform: scale(1.03);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 0 auto 2rem;
      max-width: 320px;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .divider-icon {
      color: var(--green);
      font-size: 1.1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--green-xdk);
    }

    h1 em {
      font-style: italic;
      color: var(--green-dk);
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      font-weight: 300;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--green-xdk);
      color: var(--bg);
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.55rem 1.4rem;
      border-radius: 100px;
      margin-bottom: 3rem;
    }

    .badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-lt);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .social a {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--green-lt);
      border-radius: 100px;
      transition: all 0.25s ease;
    }

    .social a:hover {
      color: var(--green-xdk);
      border-color: var(--green-dk);
      background: rgba(119, 190, 121, 0.12);
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--green-lt);
      letter-spacing: 0.06em;
    }

    /* Decorative blobs */
    .shape {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }

    .shape-1 {
      width: 520px; height: 520px;
      top: -160px; right: -160px;
      background: radial-gradient(circle, rgba(119,190,121,0.12), transparent 68%);
    }

    .shape-2 {
      width: 420px; height: 420px;
      bottom: -130px; left: -130px;
      background: radial-gradient(circle, rgba(61,122,63,0.10), transparent 68%);
    }

    .shape-3 {
      width: 200px; height: 200px;
      top: 60%; left: 60%;
      background: radial-gradient(circle, rgba(168,213,170,0.15), transparent 70%);
    }
  </style>
</head>
<body>

  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <main class="container">

    <div class="logo-wrap">
      <img src="logo.png" alt="Layaya">
    </div>

    <div class="divider">
      <span></span>
      <span class="divider-icon">✦</span>
      <span></span>
    </div>

    <h1>Pronto abrimos<br><em>nuestras puertas</em></h1>

    <p class="subtitle">
      Estamos preparando algo delicioso para ti.<br>
      Vuelve pronto y descubre todo lo que hemos preparado.
    </p>

    <div class="badge">
      <span class="dot"></span>
      En construcción
    </div>

    <div class="social">
      <a href="https://www.instagram.com/layaya.alimentacion/" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
        @layaya.alimentacion
      </a>
    </div>

  </main>

  <footer class="footer">© 2026 Layaya</footer>

</body>
</html>
